<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
        }
        .card {
            border-radius: 15px;
        }
        .form-control {
            border-radius: 10px;
        }
        .btn-custom {
            border-radius: 10px;
            background-color: #007bff;
            color: white;
        }
        .btn-custom:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-4" style="width: 500px;">
        
        <h3 class="text-center mb-4">🎓 Add Student</h3>

        <!-- ✅ FIXED FORM -->
        <form method="POST" action="/add_student/">
            {% csrf_token %}

            {% if error %}
                <div class="alert alert-danger text-center">
                    {{ error }}
                </div>
            {% endif %}

            <div class="mb-3">
                <label>Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter name" required>
            </div>

            <div class="mb-3">
                <label>Age</label>
                <input type="number" name="age" class="form-control" placeholder="Enter age" required>
            </div>

            <div class="mb-3">
                <label>Course</label>
                <input type="text" name="course" class="form-control" placeholder="Enter course" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter email" required>
            </div>

            <div class="mb-3">
                <label>Phone</label>
                <input type="text" name="phone" class="form-control" placeholder="Enter phone">
            </div>

            <div class="mb-3">
                <label>Department</label>
                <input type="text" name="department" class="form-control" placeholder="Enter department">
            </div>

            <button type="submit" class="btn btn-custom w-100">Add Student</button>
        </form>

        <div class="text-center mt-3">
            <a href="/students/" class="btn btn-secondary w-100">View Students</a>
        </div>

    </div>
</div>

</body>
</html>
