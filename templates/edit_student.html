{% extends 'base.html' %}

{% block content %}

<style>
    body {
        background: #f4f7fb;
    }

    .edit-container {
        max-width: 600px;
        margin: 40px auto;
    }

    .card {
        border-radius: 20px;
        padding: 25px;
        background: white;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h3 {
        text-align: center;
        margin-bottom: 20px;
        color: #444;
    }

    .form-control {
        border-radius: 12px;
        padding: 10px;
        border: 1px solid #ddd;
    }

    .form-control:focus {
        border-color: #6c63ff;
        box-shadow: 0 0 5px rgba(108,99,255,0.3);
    }

    .btn-save {
        background: #6c63ff;
        color: white;
        border-radius: 12px;
        padding: 10px;
        width: 100%;
    }

    .btn-save:hover {
        background: #574fd6;
    }

    .btn-back {
        margin-top: 10px;
        width: 100%;
        border-radius: 12px;
    }
</style>

<div class="edit-container">
    <div class="card">

        <h3>✏️ Edit Student</h3>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="name" value="{{ student.name }}" class="form-control mb-3">

            <input type="number" name="age" value="{{ student.age }}" class="form-control mb-3">

            <input type="text" name="course" value="{{ student.course }}" class="form-control mb-3">

            <input type="email" name="email" value="{{ student.email }}" class="form-control mb-3">

            <input type="text" name="phone" value="{{ student.phone }}" class="form-control mb-3">

            <input type="text" name="department" value="{{ student.department }}" class="form-control mb-3">

            <button type="submit" class="btn btn-save">💾 Update Student</button>
        </form>

        <a href="/students/" class="btn btn-secondary btn-back">⬅ Back</a>

    </div>
</div>

{% endblock %}
